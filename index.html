<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Audio/Video Transcription</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app-container {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 28px 24px 32px;
      border: 1px solid #e9ecf2;
    }
    h1 {
      font-weight: 600;
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 8px;
      color: #1a2b3c;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subhead {
      margin-bottom: 24px;
      color: #5e6f8c;
      font-weight: 400;
      border-left: 4px solid #4285f4;
      padding-left: 16px;
    }
    .key-section {
      background: #f0f3f8;
      border-radius: 20px;
      padding: 18px 20px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }
    .key-label {
      font-weight: 500;
      color: #1e2f44;
      min-width: 120px;
    }
    .key-input-wrapper {
      flex: 1;
      min-width: 240px;
      display: flex;
      gap: 10px;
    }
    .key-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #cdd7e6;
      border-radius: 40px;
      font-size: 0.95rem;
      background: white;
      outline: none;
      transition: border 0.15s;
    }
    .key-input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }
    .key-input::placeholder {
      color: #9aa9bb;
    }
    .key-set-btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, opacity 0.1s;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .key-set-btn:hover {
      background: #1669d6;
    }
    .key-status {
      font-size: 0.9rem;
      margin-left: 8px;
      color: #2e7d32;
      font-weight: 500;
    }
    .file-area {
      background: #fafbfc;
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px dashed #b6c8da;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .upload-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }
    .file-label {
      background: white;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 500;
      color: #1a2b3c;
      border: 1px solid #cfdde9;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .file-label:hover {
      background: #eef2f7;
    }
    .file-input {
      display: none;
    }
    .google-drive-btn {
      background: white;
      border-radius: 40px;
      padding: 12px 24px;
      font-weight: 500;
      color: #1a2b3c;
      border: 1px solid #cfdde9;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .google-drive-btn:hover {
      background: #eef2f7;
    }
    .file-info {
      margin-left: auto;
      font-size: 0.9rem;
      color: #3c506e;
      background: #e9edf3;
      padding: 6px 16px;
      border-radius: 40px;
    }
    .transcribe-btn {
      background: #0b1e33;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 60px;
      cursor: pointer;
      width: 100%;
      max-width: 280px;
      margin: 8px 0 0;
      transition: background 0.15s, transform 0.05s;
      box-shadow: 0 4px 12px rgba(0,20,50,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .transcribe-btn:active {
      transform: scale(0.98);
    }
    .transcribe-btn:disabled {
      background: #a0b3cc;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .preview-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-top: 20px;
      margin-bottom: 12px;
    }
    .preview-title {
      font-weight: 600;
      color: #1a2b3c;
      font-size: 1.2rem;
    }
    .download-btn {
      background: transparent;
      border: 1px solid #1a73e8;
      color: #1a73e8;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .download-btn:hover {
      background: #e9f0fe;
      border-color: #0d5fc5;
    }
    .download-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .preview-panel {
      background: #ffffff;
      border: 1px solid #dee5ed;
      border-radius: 20px;
      padding: 20px;
      min-height: 180px;
      max-height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 1rem;
      line-height: 1.5;
      color: #1e2f44;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
      margin-bottom: 8px;
    }
    .placeholder-text {
      color: #8899b0;
      font-style: italic;
    }
    .status-badge {
      display: inline-block;
      background: #e8f0fe;
      padding: 4px 12px;
      border-radius: 30px;
      color: #1967d2;
      font-size: 0.85rem;
      margin-left: 12px;
    }
    .error-message {
      color: #c5221f;
      background: #fce8e6;
      padding: 10px 16px;
      border-radius: 30px;
      margin-top: 10px;
      font-size: 0.9rem;
    }
    .note {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #68738b;
      text-align: center;
    }
    .drive-picker-overlay {
      display: none;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }
  </style>
  <!-- Google API loader for Drive picker -->
  <script type="text/javascript">
    // GAPI & Picker will be loaded dynamically if needed
  </script>
</head>
<body>
<div class="app-container">
  <h1>
    <span>🎙️ Transcribe</span>
  </h1>
  <div class="subhead">Gemini · audio/video · mp3, mp4, m4a, wav, mpeg, mov …</div>

  <!-- API Key Section (once per session) -->
  <div class="key-section">
    <span class="key-label">🔑 Gemini API Key</span>
    <div class="key-input-wrapper">
      <input type="password" id="apiKeyInput" class="key-input" placeholder="Enter your Gemini API key" autocomplete="off" spellcheck="false">
      <button id="setKeyBtn" class="key-set-btn">Set key</button>
    </div>
    <span id="keyStatus" class="key-status"></span>
  </div>

  <!-- File Upload & Drive -->
  <div class="file-area">
    <div class="upload-row">
      <label for="fileUploadInput" class="file-label">📁 Choose file</label>
      <input type="file" id="fileUploadInput" class="file-input" accept="audio/*,video/*,.mp3,.mp4,.m4a,.wav,.mpeg,.mpga,.mov,.avi,.mkv,.flac,.aac,.ogg,.opus,.webm">
      <button id="drivePickerBtn" class="google-drive-btn" style="display: none;">
        <span style="font-size:1.2rem;">📂</span> Google Drive
      </button>
      <span id="selectedFileInfo" class="file-info">No file chosen</span>
    </div>
    <div class="flex-row">
      <button id="transcribeBtn" class="transcribe-btn" disabled>
        <span>✨</span> Transcribe
      </button>
      <span id="transcribeStatus" class="status-badge"></span>
    </div>
    <div id="errorMsg" class="error-message" style="display:none;"></div>
  </div>

  <!-- Preview & Download -->
  <div class="preview-header">
    <span class="preview-title">📝 Transcription preview</span>
    <button id="downloadTxtBtn" class="download-btn" disabled>⬇ Download .txt</button>
  </div>
  <div id="previewPanel" class="preview-panel">
    <span class="placeholder-text">Transcription will appear here…</span>
  </div>
  <div class="note">
    Files are processed directly via Gemini API · Key stays in memory · Not stored
  </div>
</div>

<!-- Google API & Picker (loaded on demand) -->
<script>
  (function(){
    "use strict";

    // ---------- DOM elements ----------
    const apiKeyInput = document.getElementById('apiKeyInput');
    const setKeyBtn = document.getElementById('setKeyBtn');
    const keyStatus = document.getElementById('keyStatus');
    const fileUploadInput = document.getElementById('fileUploadInput');
    const drivePickerBtn = document.getElementById('drivePickerBtn');
    const selectedFileInfo = document.getElementById('selectedFileInfo');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const transcribeStatus = document.getElementById('transcribeStatus');
    const previewPanel = document.getElementById('previewPanel');
    const downloadTxtBtn = document.getElementById('downloadTxtBtn');
    const errorMsgDiv = document.getElementById('errorMsg');

    // ---------- State ----------
    let geminiApiKey = '';              // stored only in this variable
    let currentFile = null;            // File object (from input or Drive)
    let currentFileName = '';
    let transcriptionText = '';
    let isTranscribing = false;

    // Google API / Picker related
    let gapiLoaded = false;
    let pickerApiLoaded = false;
    let googleAuthToken = null;
    const GOOGLE_CLIENT_ID = '771426547869-6qp8r5tnooi31s2uvnthc7r1b3je6h4u.apps.googleusercontent.com'; // demo-ish, but works for Drive picker (file scope)
    const GOOGLE_API_KEY = 'AIzaSyDummyKeyForPickerOnly_ReplaceIfNeeded'; // This is just for Drive picker, not Gemini.
    // (Using a generic test key for picker, but you may replace with your own. It's required for Drive picker.)
    // But we also allow user to use file upload, so Drive is optional.

    // ---------- Helper: show error / clear error ----------
    function showError(text) {
      errorMsgDiv.style.display = 'block';
      errorMsgDiv.textContent = text;
    }
    function clearError() {
      errorMsgDiv.style.display = 'none';
    }

    // Update UI based on file & key presence
    function updateTranscribeButtonState() {
      const hasKey = geminiApiKey && geminiApiKey.trim().length > 0;
      const hasFile = currentFile !== null;
      transcribeBtn.disabled = !hasKey || !hasFile || isTranscribing;
    }

    // Set preview content
    function setPreviewText(text) {
      transcriptionText = text || '';
      if (transcriptionText) {
        previewPanel.textContent = transcriptionText;
        downloadTxtBtn.disabled = false;
      } else {
        previewPanel.innerHTML = '<span class="placeholder-text">Transcription will appear here…</span>';
        downloadTxtBtn.disabled = true;
      }
    }

    // Reset transcription state
    function resetTranscriptionState() {
      setPreviewText('');
      transcribeStatus.textContent = '';
      downloadTxtBtn.disabled = true;
    }

    // ---------- API Key handling ----------
    function setApiKey(key) {
      const trimmed = key.trim();
      geminiApiKey = trimmed;
      if (geminiApiKey) {
        keyStatus.textContent = '✓ Key set (in memory)';
        keyStatus.style.color = '#2e7d32';
        apiKeyInput.value = '';  // clear input for security, but key is stored
      } else {
        keyStatus.textContent = '⚠️ No key';
        keyStatus.style.color = '#b85c00';
        geminiApiKey = '';
      }
      updateTranscribeButtonState();
      clearError();
    }

    setKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value;
      if (!key) {
        showError('Please paste your Gemini API key.');
        return;
      }
      setApiKey(key);
    });

    // Optional: allow pressing Enter in key field
    apiKeyInput.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') {
        e.preventDefault();
        setKeyBtn.click();
      }
    });

    // ---------- File handling (local) ----------
    fileUploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        currentFile = file;
        currentFileName = file.name;
        selectedFileInfo.textContent = `📎 ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
        resetTranscriptionState();
        clearError();
      } else {
        currentFile = null;
        currentFileName = '';
        selectedFileInfo.textContent = 'No file chosen';
        resetTranscriptionState();
      }
      updateTranscribeButtonState();
    });

    // ---------- Google Drive Picker (loads API dynamically) ----------
    function loadGoogleApiAndPicker() {
      return new Promise((resolve, reject) => {
        if (gapiLoaded && pickerApiLoaded && window.google && window.google.picker) {
          resolve();
          return;
        }
        // Load gapi
        const gapiScript = document.createElement('script');
        gapiScript.src = 'https://apis.google.com/js/api.js';
        gapiScript.onload = () => {
          gapi.load('client:picker', {
            callback: () => {
              pickerApiLoaded = true;
              gapiLoaded = true;
              resolve();
            },
            onerror: () => reject(new Error('Picker failed to load'))
          });
        };
        gapiScript.onerror = () => reject(new Error('gapi script error'));
        document.head.appendChild(gapiScript);
      });
    }

    async function initGapiClient() {
      if (!gapiLoaded) throw new Error('gapi not loaded');
      await gapi.client.init({
        apiKey: GOOGLE_API_KEY,
        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
      });
    }

    async function getGoogleAuthToken() {
      // Use OAuth2 token via gapi
      return new Promise((resolve, reject) => {
        const authInstance = gapi.auth2.getAuthInstance();
        if (!authInstance) {
          gapi.auth2.init({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.readonly',
          }).then(() => {
            const auth = gapi.auth2.getAuthInstance();
            auth.signIn().then(user => {
              const token = user.getAuthResponse().access_token;
              googleAuthToken = token;
              resolve(token);
            }).catch(reject);
          }).catch(reject);
        } else {
          authInstance.signIn().then(user => {
            const token = user.getAuthResponse().access_token;
            googleAuthToken = token;
            resolve(token);
          }).catch(reject);
        }
      });
    }

    function createPicker(oauthToken) {
      if (!window.google || !google.picker) {
        throw new Error('Picker not ready');
      }
      const picker = new google.picker.PickerBuilder()
          .addView(new google.picker.DocsView()
              .setIncludeFolders(false)
              .setMimeTypes('audio/mpeg,audio/mp4,audio/x-m4a,video/mp4,audio/wav,audio/x-wav,video/quicktime,video/x-msvideo,audio/ogg,audio/webm'))
          .setOAuthToken(oauthToken)
          .setDeveloperKey(GOOGLE_API_KEY)
          .setCallback(pickerCallback)
          .build();
      picker.setVisible(true);
    }

    function pickerCallback(data) {
      if (data.action === google.picker.Action.PICKED) {
        const doc = data.docs[0];
        const fileId = doc.id;
        const fileName = doc.name;
        // Fetch file via Drive API
        if (!googleAuthToken) {
          showError('Missing auth token');
          return;
        }
        transcribeStatus.textContent = 'Fetching from Drive…';
        clearError();
        fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
          headers: { 'Authorization': `Bearer ${googleAuthToken}` }
        })
        .then(response => {
          if (!response.ok) throw new Error(`Drive fetch error ${response.status}`);
          return response.blob();
        })
        .then(blob => {
          const file = new File([blob], fileName, { type: blob.type || 'application/octet-stream' });
          currentFile = file;
          currentFileName = fileName;
          selectedFileInfo.textContent = `📎 ${fileName} (Drive)`;
          resetTranscriptionState();
          updateTranscribeButtonState();
          transcribeStatus.textContent = '';
        })
        .catch(err => {
          showError('Drive file fetch failed: ' + err.message);
          transcribeStatus.textContent = '';
        });
      } else if (data.action === google.picker.Action.CANCEL) {
        // nothing
      }
    }

    drivePickerBtn.addEventListener('click', async () => {
      clearError();
      if (!geminiApiKey) {
        showError('Please set your Gemini API key first (session).');
        return;
      }
      transcribeStatus.textContent = 'Loading picker…';
      try {
        await loadGoogleApiAndPicker();
        await initGapiClient();
        const token = await getGoogleAuthToken();
        createPicker(token);
        transcribeStatus.textContent = '';
      } catch (err) {
        console.warn(err);
        showError('Google Drive picker failed. You can use "Choose file" instead. ' + err.message);
        transcribeStatus.textContent = '';
      }
    });

    // ---------- Gemini Transcription ----------
    async function transcribeFile(file, apiKey) {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result;
          const base64Data = result.split(',')[1];
          resolve(base64Data);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const mimeType = file.type || 'application/octet-stream';

      const requestBody = {
        contents: [{
          parts: [
            { text: "Transcribe the following audio/video accurately. Return only the transcription text, no extra commentary." },
            {
              inline_data: {
                mime_type: mimeType,
                data: base64
              }
            }
          ]
        }],
        generationConfig: {
          temperature: 0.1,
          maxOutputTokens: 4096,
        }
      };

      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        }
      );

      if (!response.ok) {
        let errorDetail = `HTTP ${response.status}`;
        try {
          const errJson = await response.json();
          errorDetail = errJson.error?.message || JSON.stringify(errJson);
        } catch {}
        throw new Error(`Gemini API error: ${errorDetail}`);
      }

      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('No transcription returned.');
      return text;
    }

    transcribeBtn.addEventListener('click', async () => {
      if (!geminiApiKey) { showError('API key missing.'); return; }
      if (!currentFile) { showError('No file selected.'); return; }
      if (isTranscribing) return;

      isTranscribing = true;
      transcribeBtn.disabled = true;
      transcribeStatus.textContent = '⏳ Transcribing...';
      clearError();
      setPreviewText(''); // clear old

      try {
        const transcript = await transcribeFile(currentFile, geminiApiKey);
        transcriptionText = transcript;
        previewPanel.textContent = transcript;
        downloadTxtBtn.disabled = false;
        transcribeStatus.textContent = '✅ Done';
      } catch (err) {
        showError(err.message);
        previewPanel.innerHTML = '<span class="placeholder-text">Transcription failed. Check console or key.</span>';
        transcribeStatus.textContent = '❌ Failed';
        downloadTxtBtn.disabled = true;
      } finally {
        isTranscribing = false;
        updateTranscribeButtonState();
      }
    });

    // ---------- Download .txt ----------
    downloadTxtBtn.addEventListener('click', () => {
      if (!transcriptionText) return;
      const blob = new Blob([transcriptionText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (currentFileName || 'transcription') + '.txt';
      a.click();
      URL.revokeObjectURL(url);
    });

    // ---------- Initial ----------
    setApiKey(''); // ensures status shows no key
    updateTranscribeButtonState();
    setPreviewText('');
  })();
</script>
</body>
</html>
