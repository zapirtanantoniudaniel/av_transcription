<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Pro/Lite Transcriber</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #f5f7fc; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1.5rem; }
    .app-container { max-width: 800px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2rem; }
    h1 { margin-top: 0; color: #1e293b; font-size: 1.8rem; }
    .section { background: #f8fafc; border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; border: 1px solid #e2e8f0; }
    .input-group { display: flex; gap: 10px; margin-top: 8px; }
    input[type="password"], input[type="text"] { flex: 1; padding: 0.7rem 1rem; border-radius: 50px; border: 1.5px solid #cbd5e1; outline: none; }
    .btn { padding: 0.7rem 1.4rem; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-primary { background: #1e293b; color: white; width: 100%; margin-top: 10px; font-size: 1.1rem; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline { background: white; border: 1.5px solid #cbd5e1; }
    .mode-toggle { display: flex; align-items: center; justify-content: space-between; background: #eff6ff; padding: 12px 18px; border-radius: 12px; border: 1px solid #dbeafe; margin-bottom: 1.5rem; }
    .toggle-label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 500; color: #1e40af; }
    .preview-panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.2rem; min-height: 150px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; }
    .status { font-size: 0.85rem; color: #64748b; margin-top: 10px; display: flex; align-items: center; gap: 8px; }
    .error { color: #b91c1c; background: #fee2e2; padding: 8px 15px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; }
    .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: #e2e8f0; }
  </style>
</head>
<body>

<div class="app-container">
  <h1>🎙️ Transcribe · Gemini</h1>
  
  <div class="section">
    <label style="font-weight: 500; font-size: 0.9rem;">Gemini API Key</label>
    <div class="input-group">
      <input type="password" id="apiKeyInput" placeholder="Paste your API key here">
      <div>
      <button class="btn btn-outline" id="getKeyBtn">Get Key</button>
      <button class="btn btn-outline" id="setKeyBtn">Set Key</button>
      </div>
    </div>
    <div id="keyStatus" class="status">⚪ No key loaded</div>
  </div>

  <div class="section">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span id="fileName">Select an audio/video file</span>
      <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">Browse</button>
    </div>
    <input type="file" id="fileInput" hidden accept="audio/*,video/*">
  </div>

  <div class="mode-toggle">
    <div>
      <div style="font-weight: 600; font-size: 0.95rem; color: #1e3a8a;">Transcription Engine</div>
      <div style="font-size: 0.75rem; color: #64748b;" id="quotaHint">Current: High-Volume (500 RPD)</div>
    </div>
    <label class="toggle-label">
      <input type="checkbox" id="accuracyToggle" style="width: 18px; height: 18px;">
      🎯 High Accuracy
    </label>
  </div>

  <button class="btn btn-primary" id="transcribeBtn" disabled>🎤 Start Transcription</button>
  
  <div id="statusArea" class="status"></div>
  <div id="errorArea"></div>

  <div style="margin-top: 1.5rem;">
    <div style="font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between;">
      <span>Result</span>
      <button class="btn btn-outline" id="downloadBtn" disabled style="padding: 2px 10px; font-size: 0.7rem;">⬇️ Download .txt</button>
    </div>
    <div id="previewPanel" class="preview-panel">
      <span style="color: #94a3b8; font-style: italic;">Your transcript will appear here...</span>
    </div>
  </div>
</div>

<script type="module">
  let apiKey = null;
  const key = 'apikey';
  let selectedFile = null;

  const elements = {
    apiKeyInput: document.getElementById('apiKeyInput'),
    setKeyBtn: document.getElementById('setKeyBtn'),
    getKeyBtn: document.getElementById('getKeyBtn'),
    keyStatus: document.getElementById('keyStatus'),
    fileInput: document.getElementById('fileInput'),
    fileName: document.getElementById('fileName'),
    accuracyToggle: document.getElementById('accuracyToggle'),
    quotaHint: document.getElementById('quotaHint'),
    transcribeBtn: document.getElementById('transcribeBtn'),
    statusArea: document.getElementById('statusArea'),
    errorArea: document.getElementById('errorArea'),
    previewPanel: document.getElementById('previewPanel'),
    downloadBtn: document.getElementById('downloadBtn')
  };

  // UI Updates (unchanged)
  elements.getKeyBtn.onclick = () => {
    const apiKey2 = localStorage.getItem(key);
    if (apiKey2) {
      elements.apiKeyInput.value = apiKey2;
      apiKey = apiKey2;
    }
    if(apiKey) {
      elements.keyStatus.innerHTML = `✅ Key Loaded (Starts with ${apiKey.substring(0,4)})`;
      elements.apiKeyInput.value = "";
      checkReady();
    }
  };

  elements.setKeyBtn.onclick = () => {
    apiKey = elements.apiKeyInput.value.trim();
    if(apiKey) {
      elements.keyStatus.innerHTML = `✅ Key Loaded (Starts with ${apiKey.substring(0,4)})`;
      localStorage.setItem(key, apiKey);
      elements.apiKeyInput.value = "";
      checkReady();
    }
  };

  elements.fileInput.onchange = (e) => {
    selectedFile = e.target.files[0];
    if(selectedFile) {
      elements.fileName.innerText = selectedFile.name;
      checkReady();
    }
  };

  elements.accuracyToggle.onchange = (e) => {
    elements.quotaHint.innerText = e.target.checked 
      ? "Current: High-Accuracy (Low Quota ~20 RPD)" 
      : "Current: High-Volume (High Quota ~500 RPD)";
  };

  function checkReady() {
    elements.transcribeBtn.disabled = !(apiKey && selectedFile);
  }

  // Helper: Convert AudioBuffer to WAV ArrayBuffer (mono, 16-bit)
  function audioBufferToWav(buffer) {
    const numChannels = 1; // Force mono output
    const sampleRate = buffer.sampleRate;
    const bitsPerSample = 16;
    const samples = buffer.getChannelData(0);
    const dataLength = samples.length * (bitsPerSample / 8);
    const bufferLength = 44 + dataLength;
    
    const arrayBuffer = new ArrayBuffer(bufferLength);
    const view = new DataView(arrayBuffer);
    
    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }
    
    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataLength, true);
    writeString(view, 8, 'WAVE');
    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true); // PCM
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * numChannels * bitsPerSample / 8, true);
    view.setUint16(32, numChannels * bitsPerSample / 8, true);
    view.setUint16(34, bitsPerSample, true);
    writeString(view, 36, 'data');
    view.setUint32(40, dataLength, true);
    
    let offset = 44;
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
    return arrayBuffer;
  }
  
  function arrayBufferToBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    for (let i = 0; i < bytes.byteLength; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  // Main Transcription with 20-minute chunking using low-memory OfflineAudioContext
  async function runTranscription() {
    const isPro = elements.accuracyToggle.checked;
    const model = isPro ? "gemini-2.5-flash" : "gemini-3.1-flash-lite-preview";
    
    elements.transcribeBtn.disabled = true;
    elements.errorArea.innerHTML = "";
    elements.statusArea.innerHTML = `⏳ Processing with ${model}...`;
    elements.previewPanel.innerText = "Processing... this may take a while for large files.";

    try {
      // Decode full audio but keep only one channel's data to save memory
      const arrayBuffer = await selectedFile.arrayBuffer();
      const audioCtx = new AudioContext();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      
      const sampleRate = audioBuffer.sampleRate;
      const totalSamples = audioBuffer.length;
      const channel0Data = audioBuffer.getChannelData(0); // Float32Array reference, no copy
      
      audioCtx.close(); // Release the original AudioContext
      
      const CHUNK_DURATION_SEC = 20 * 60; // 20 minutes
      const chunkSizeSamples = CHUNK_DURATION_SEC * sampleRate;
      const numChunks = Math.ceil(totalSamples / chunkSizeSamples);
      let fullTranscript = "";

      for (let i = 0; i < numChunks; i++) {
        elements.statusArea.innerHTML = `⏳ Transcribing chunk ${i+1} of ${numChunks}...`;
        
        const startSample = i * chunkSizeSamples;
        const endSample = Math.min(startSample + chunkSizeSamples, totalSamples);
        const chunkLength = endSample - startSample;
        
        // Use a lightweight OfflineAudioContext to render just this slice
        const offlineCtx = new OfflineAudioContext(1, chunkLength, sampleRate);
        const bufferSource = offlineCtx.createBufferSource();
        const sliceBuffer = offlineCtx.createBuffer(1, chunkLength, sampleRate);
        sliceBuffer.getChannelData(0).set(channel0Data.slice(startSample, endSample));
        bufferSource.buffer = sliceBuffer;
        bufferSource.connect(offlineCtx.destination);
        bufferSource.start(0);
        
        const renderedBuffer = await offlineCtx.startRendering();
        
        const wavData = audioBufferToWav(renderedBuffer);
        const chunkBase64 = arrayBufferToBase64(wavData);
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        const payload = {
          contents: [{
            parts: [
              { text: "Transcribe the following audio exactly. Do not summarize or explain. If there is silence, wait for the next word. If the audio ends, stop immediately. Provide only the transcription text." },
              { inline_data: { mime_type: "audio/wav", data: chunkBase64 } }
            ]
          }],
          generationConfig: { temperature: 0.2, topP: 0.95, maxOutputTokens: 32767 }
        };

        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error?.message || `HTTP Error ${response.status}`);
        }

        let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        text = text.trim().replace(/(.{30,})\1+/g, '$1');
        fullTranscript += text + " ";
      }

      if (!fullTranscript.trim()) throw new Error("The model returned an empty transcript.");

      elements.previewPanel.innerText = fullTranscript.trim();
      elements.statusArea.innerHTML = "✅ Done!";
      elements.downloadBtn.disabled = false;

    } catch (err) {
      elements.errorArea.innerHTML = `<div class="error">⚠️ ${err.message}</div>`;
      elements.statusArea.innerHTML = "❌ Failed";
      elements.previewPanel.innerText = "Error occurred during transcription.";
    } finally {
      elements.transcribeBtn.disabled = false;
    }
  }

  elements.transcribeBtn.onclick = runTranscription;

  elements.downloadBtn.onclick = () => {
    const blob = new Blob([elements.previewPanel.innerText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `transcript_${Date.now()}.txt`;
    a.click();
  };
</script>

</body>
</html>
